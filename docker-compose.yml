# Docker Compose configuration for Ship Plate Line Heating simulation
version: '3.8'

services:
  simulation:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: ship-plate-lineheating:latest
    container_name: lineheating-sim
    volumes:
      # Mount results directory to persist outputs
      - ./results:/workspace/results
      # Optional: mount custom config files
      - ./run_config.json:/workspace/run_config.json:ro
    environment:
      - PYTHONUNBUFFERED=1
    # Override default entrypoint for custom commands
    # Uncomment and modify as needed:
    # command: ["--config", "run_config.json"]
    
    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

  # Development/interactive service
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: ship-plate-lineheating:dev
    container_name: lineheating-dev
    volumes:
      - ./results:/workspace/results
      - ./run_config.json:/workspace/run_config.json:ro
      # Mount source for development
      - ./python_prototype:/workspace/python_prototype
      - ./thermo_fem:/workspace/thermo_fem
      - ./scripts:/workspace/scripts
    environment:
      - PYTHONUNBUFFERED=1
    command: ["/bin/bash"]
    stdin_open: true
    tty: true
